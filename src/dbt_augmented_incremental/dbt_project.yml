name: 'dbt_augmented_incremental'
version: '1.0.0'
config-version: 2

profile: 'dbt_augmented_incremental'

vars:
  # Set per invocation. The driver passes these as --vars or via env-derived defaults.
  catalog: main
  staging_schema: tpcdi_incremental_staging
  scale_factor: '10'
  wh_db: ''
  tpcdi_directory: '/Volumes/main/tpcdi_raw_data/tpcdi_volume/'
  batch_date: ''               # ISO date for the current incremental run (per-batch)
  benchmark_start_date: '2015-07-06'

model-paths: ["models/"]
macro-paths: ["macros/"]
seed-paths: ["seeds/"]
test-paths: ["tests/"]
target-path: "target"
clean-targets:
  - target
  - dbt_packages
  - logs

dispatch:
  - macro_namespace: dbt
    search_order: ['dbt_augmented_incremental', 'dbt']
  - macro_namespace: dbt_utils
    search_order: ['dbt_augmented_incremental', 'dbt_utils']

models:
  dbt_augmented_incremental:
    +schema: "{{ var('wh_db') }}_{{ var('scale_factor') }}"
    bronze:
      +materialized: incremental
      +incremental_strategy: append
      +on_schema_change: ignore
    silver:
      +materialized: incremental
      +incremental_strategy: merge
      +on_schema_change: ignore
    gold:
      +materialized: incremental
      +on_schema_change: ignore
