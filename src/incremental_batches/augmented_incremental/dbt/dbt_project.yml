name: 'dbt_augmented_incremental'
version: '1.0.0'
config-version: 2

profile: 'dbt_augmented_incremental'

vars:
  # Set per invocation. The driver passes these as --vars or via env-derived defaults.
  catalog: main
  staging_schema: tpcdi_incremental_staging
  scale_factor: '10'
  wh_db: ''
  tpcdi_directory: '/Volumes/main/tpcdi_raw_data/tpcdi_volume/'
  batch_date: ''               # ISO date for the current incremental run (per-batch)
  benchmark_start_date: '2015-07-06'
  # Disable dbt-databricks's auto-OPTIMIZE behaviors (1.11+ runs
  # `OPTIMIZE table` after snapshot / table v2 materializations and
  # liquid-clustered incrementals). Equivalent to the
  # DATABRICKS_SKIP_OPTIMIZE=true env var. We don't want dbt-launched
  # OPTIMIZE during the benchmark — it would skew per-batch timings.
  databricks_skip_optimize: true
  # Snowflake-only — name of the external stage that points at the same
  # _dailybatches S3 prefix the Databricks Volume reads. Used by the
  # snowflake_models/bronze/* models. Override via --vars per invocation.
  snowflake_stage: 'tpcdi_stage'

# Three parallel model trees — the active one is selected by target.type at
# parse time via +enabled flags below. Same dbt_project.yml drives Databricks,
# Snowflake, and BigQuery runs; CLI controls which engine via --target.
model-paths: ["models/", "snowflake_models/", "bigquery_models/"]
macro-paths: ["macros/"]
seed-paths: ["seeds/"]
test-paths: ["tests/"]
target-path: "target"
clean-targets:
  - target
  - dbt_packages
  - logs

dispatch:
  - macro_namespace: dbt
    search_order: ['dbt_augmented_incremental', 'dbt']

models:
  dbt_augmented_incremental:
    # NOTE: target schema is the connection's default schema (set by the
    # caller — for the augmented_dbt workflow that's `{wh_db}_{sf}`, set
    # via the dbt_task config). We deliberately do NOT set `+schema` here:
    # dbt's default `generate_schema_name` macro APPENDS `+schema` to the
    # connection schema as `{default}_{custom}`, which would produce a
    # doubled name like `wh_db_sf_wh_db_sf`.

    # Databricks tree (models/) — active only when --target=databricks.
    bronze:
      +enabled: "{{ target.type == 'databricks' }}"
      +materialized: incremental
      +incremental_strategy: append
      +on_schema_change: ignore
    silver:
      +enabled: "{{ target.type == 'databricks' }}"
      +materialized: incremental
      +incremental_strategy: merge
      +on_schema_change: ignore
    gold:
      +enabled: "{{ target.type == 'databricks' }}"
      +materialized: incremental
      +on_schema_change: ignore

    # Snowflake tree (snowflake_models/sf_{bronze,silver,gold}/) — active
    # only when --target=snowflake. Subdir names are prefixed `sf_` to
    # avoid colliding with the Databricks tree's bronze/silver/gold config
    # paths (dbt's config resolution is based on subdir name *inside*
    # model-paths, not the model-path itself, so unprefixed names would
    # double-apply the +enabled flag to both engines).
    sf_bronze:
      +enabled: "{{ target.type == 'snowflake' }}"
      +materialized: incremental
      +incremental_strategy: append
      +on_schema_change: ignore
      +transient: false
    sf_silver:
      +enabled: "{{ target.type == 'snowflake' }}"
      +materialized: incremental
      +incremental_strategy: merge
      +on_schema_change: ignore
      +transient: false
    sf_gold:
      +enabled: "{{ target.type == 'snowflake' }}"
      +materialized: incremental
      +on_schema_change: ignore
      +transient: false

    # BigQuery tree (bigquery_models/bq_{bronze,silver,gold}/) — active only
    # when --target=bigquery. Same +enabled gating pattern as the Snowflake
    # tree, with `bq_` prefix to keep config keys distinct.
    bq_bronze:
      +enabled: "{{ target.type == 'bigquery' }}"
      +materialized: incremental
      +incremental_strategy: append
      +on_schema_change: ignore
    bq_silver:
      +enabled: "{{ target.type == 'bigquery' }}"
      +materialized: incremental
      +incremental_strategy: merge
      +on_schema_change: ignore
    bq_gold:
      +enabled: "{{ target.type == 'bigquery' }}"
      +materialized: incremental
      +on_schema_change: ignore
